services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: formfleksbaseapp-api:latest
    container_name: formfleksbaseapp-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: formfleksbaseapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: FormfleksBaseAppTest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FormfleksBaseAppTest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
